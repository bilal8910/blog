<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeMaster App V2 - لوحة التحكم وحاسبة الوقود</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: #121824;
            --accent-color: #deff9a;
            --accent-hover: #c4f075;
            --text-main: #ffffff;
            --text-muted: #8a99ad;
            --border-color: rgba(222, 255, 154, 0.1);
            --danger: #ff5c5c;
            --success: #00e676;
            --fuel-color: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        header h1 { font-size: 28px; font-weight: 700; }
        header h1 span { color: var(--accent-color); }

        .date-badge {
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--accent-color);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title { color: var(--text-muted); font-size: 14px; font-weight: 600; }
        
        .card-icon {
            width: 38px;
            height: 38px;
            background: rgba(222, 255, 154, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            font-size: 16px;
        }

        .card-value { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .card-status { font-size: 13px; color: var(--text-muted); }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .section-box {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .section-box h2 {
            font-size: 19px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-box h2 i { color: var(--accent-color); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
        
        .form-control {
            width: 100%;
            padding: 12px;
            background: #182030;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .form-control:focus { border-color: var(--accent-color); }
        
        .btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 15px;
            transition: background 0.3s;
        }

        .btn:hover { background-color: var(--accent-hover); }
        
        .btn-fuel {
            background-color: var(--fuel-color);
            color: #000;
        }
        .btn-fuel:hover { background-color: #7dd3fc; }

        .result-box {
            background: #182030;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid var(--fuel-color);
            display: none;
        }

        .data-list { margin-top: 20px; max-height: 180px; overflow-y: auto; }
        .data-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: #182030; border-radius: 8px; margin-bottom: 10px; font-size: 14px;
        }
        .item-danger { border-right: 4px solid var(--danger); }
        .item-success { border-right: 4px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Life<span>Master</span> <small style="font-size:14px; color:var(--text-muted);">V2.0</small></h1>
        <div class="date-badge" id="currentDate">اليوم</div>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <div class="card-header">
                <span class="card-title">الميزانية المتوفرة</span>
                <div class="card-icon"><i class="fa-solid fa-wallet"></i></div>
            </div>
            <div class="card-value" id="balanceVal">0.00 د.م</div>
            <div class="card-status" id="financialStatus">التوفير: 0 د.م | الاستثمار: 0 د.م</div>
        </div>

        <div class="card" style="border-color: rgba(56, 189, 248, 0.2);">
            <div class="card-header">
                <span class="card-title">معدل استهلاك الوقود</span>
                <div class="card-icon" style="color:var(--fuel-color); background:rgba(56,189,248,0.1);"><i class="fa-solid fa-gas-pump"></i></div>
            </div>
            <div class="card-value" id="dashFuelRatio">0.0 لتر/100كم</div>
            <div class="card-status" id="dashFuelCost">التكلفة: 0.00 د.م/كم</div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">تتبع الوزن الحالي</span>
                <div class="card-icon"><i class="fa-solid fa-weight-scale"></i></div>
            </div>
            <div class="card-value" id="weightVal">75.0 كجم</div>
            <div class="card-status" id="weightStatus">جاهز للمراقبة</div>
        </div>
    </div>

    <div class="main-content">
        
        <div class="section-box" style="border-color: rgba(56, 189, 248, 0.2);">
            <h2><i class="fa-solid fa-calculator" style="color:var(--fuel-color);"></i> حاسبة استهلاك الوقود (السيارة)</h2>
            
            <div class="form-group">
                <label>المسافة المقطوعة (كيلومتر - كم)</label>
                <input type="number" class="form-control" id="fuelKm" placeholder="مثال: 500">
            </div>
            
            <div class="form-group">
                <label>كمية الوقود المستهلكة (لتر) أو المبلغ الإجمالي المدفوع</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" class="form-control" id="fuelInputAmount" placeholder="مثال: 35">
                    <select class="form-control" id="fuelInputType" style="width: 120px;">
                        <option value="liters">لتر</option>
                        <option value="dirhams">درهم</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>ثمن اللتر الحالي بالمغرب (درهم/لتر) *اختياري لحساب التكلفة بدقة</label>
                <input type="number" class="form-control" id="pricePerLiter" value="13.50" step="0.01">
            </div>

            <button class="btn btn-fuel" onclick="calculateFuel()">احسب واخصم من الميزانية</button>

            <div class="result-box" id="fuelResult">
                <p id="resLitersPer100" style="font-weight: 600; color: #fff;"></p>
                <p id="resCostPerKm" style="font-size: 14px; color: var(--text-muted); margin-top: 5px;"></p>
            </div>
        </div>

        <div class="section-box">
            <h2><i class="fa-solid fa-cash-register"></i> إدارة الأموال والاستثمار</h2>
            <div class="form-group">
                <label>نوع العملية</label>
                <select class="form-control" id="finType">
                    <option value="income">دخل شهري (+)</option>
                    <option value="expense">مصروف يومي (-)</option>
                    <option value="saving">توفير (+)</option>
                    <option value="investment">استثمار ومحفظة (+)</option>
                </select>
            </div>
            <div class="form-group">
                <label>المبلغ (بالدرهم المغربي)</label>
                <input type="number" class="form-control" id="finAmount" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>البيان / الوصف</label>
                <input type="text" class="form-control" id="finDesc" placeholder="مثال: راتب، بقالة، فطور...">
            </div>
            <button class="btn" onclick="addFinancial()">تسجيل العملية</button>

            <div class="data-list" id="financialLogs"></div>
        </div>

    </div>
</div>

<script>
    // وضع ترويسة تاريخ اليوم بالمغرب تلقائياً
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-MA', options);

    let appData = {
        balance: 0,
        saving: 0,
        investment: 0,
        weight: 75
    };

    function updateFinancialUI() {
        document.getElementById('balanceVal').innerText = appData.balance.toFixed(2) + ' د.م';
        document.getElementById('financialStatus').innerText = `التوفير: ${appData.saving} د.م | الاستثمار: ${appData.investment} د.م`;
    }

    function addFinancial() {
        const type = document.getElementById('finType').value;
        const amount = parseFloat(document.getElementById('finAmount').value);
        const desc = document.getElementById('finDesc').value || 'عملية غير مصنفة';

        if(isNaN(amount) || amount <= 0) { alert('الرجاء إدخال مبلغ صحيح'); return; }

        executeTransaction(type, amount, desc);
        
        document.getElementById('finAmount').value = '';
        document.getElementById('finDesc').value = '';
    }

    // دالة مرنة لمعالجة المعاملات المالية داخل السجل وخصمها
    function executeTransaction(type, amount, desc) {
        let logClass = '';
        let prefix = '';

        if(type === 'income') { appData.balance += amount; logClass = 'item-success'; prefix = '+ '; }
        else if(type === 'expense') { appData.balance -= amount; logClass = 'item-danger'; prefix = '- '; }
        else if(type === 'saving') { appData.saving += amount; appData.balance -= amount; logClass = 'item-success'; prefix = 'توفير + '; }
        else if(type === 'investment') { appData.investment += amount; appData.balance -= amount; logClass = 'item-success'; prefix = 'استثمار + '; }

        updateFinancialUI();

        const logBox = document.getElementById('financialLogs');
        const item = document.createElement('div');
        item.className = `data-item ${logClass}`;
        item.innerHTML = `<span>${desc}</span> <strong>${prefix}${amount.toFixed(2)} د.م</strong>`;
        logBox.insertBefore(item, logBox.firstChild);
    }

    // حاسبة الوقود الذكية المربوطة بالميزانية
    function calculateFuel() {
        const km = parseFloat(document.getElementById('fuelKm').value);
        const inputVal = parseFloat(document.getElementById('fuelInputAmount').value);
        const inputType = document.getElementById('fuelInputType').value;
        const pricePerLiter = parseFloat(document.getElementById('pricePerLiter').value) || 13.50;

        if(isNaN(km) || km <= 0 || !inputVal || inputVal <= 0) {
            alert('الرجاء إدخال بيانات المسافة والوقود بشكل صحيح لكي تتم الحسبة.');
            return;
        }

        let liters = 0;
        let totalCostDirhams = 0;

        if (inputType === 'liters') {
            liters = inputVal;
            totalCostDirhams = liters * pricePerLiter;
        } else {
            totalCostDirhams = inputVal;
            liters = totalCostDirhams / pricePerLiter;
        }

        // 1. حساب معدل الاستهلاك الفعلي لكل 100 كم
        const litersPer100Km = (liters / km) * 100;
        // 2. حساب تكلفة الكيلومتر الواحد بالدرهم
        const costPerKm = totalCostDirhams / km;

        // تحديث البطاقة العلوية الرئيسية في لوحة التحكم
        document.getElementById('dashFuelRatio').innerText = litersPer100Km.toFixed(1) + ' لتر/100كم';
        document.getElementById('dashFuelCost').innerText = `التكلفة: ${costPerKm.toFixed(2)} د.م/كم`;

        // إظهار النتائج التفصيلية في صندوق التحليل
        document.getElementById('resLitersPer100').innerText = `معدل استهلاك سيارتك: ${litersPer100Km.toFixed(2)} لتر لكل 100 كيلومتر.`;
        document.getElementById('resCostPerKm').innerText = `تكلفة التنقل الفردية: كل 1 كيلومتر يكلفك حوالي ${costPerKm.toFixed(2)} درهم مغربي.`;
        document.getElementById('fuelResult').style.display = 'block';

        // 3. الربط التلقائي والخصم من ميزانية التطبيق المالية كـ (مصروف يومي للوقود)
        executeTransaction('expense', totalCostDirhams, `مصاريف وقود سيارة (${km} كم)`);
    }
</script>

</body>
</html>
