<style>

body.light { --bg:#f0f4f8; --bg2:#fff; --bg3:#e8edf5; --text:#1a1a2e; --text2:#555; --text3:#999; --border:rgba(0,180,216,0.2); }

/* HEADER */

.logo { text-decoration:none; }

.hright { display:flex; align-items:center; gap:8px; }
.lang-sw { display:flex; gap:3px; }
.lb { background:transparent; border:1px solid var(--border); color:var(--text2); font-size:11px; font-weight:700; padding:4px 9px; border-radius:10px; cursor:pointer; font-family:"Tajawal",sans-serif; transition:all 0.2s; }
.lb.on { background:var(--accent); color:#fff; border-color:var(--accent); }

.tags-container { margin:35px 0 20px; padding-top:20px; border-top:1px solid var(--border); }
.tags-title { font-size:13px; color:var(--text3); margin-bottom:10px; font-weight:700; }

.tag-item { background:var(--bg2); color:var(--accent); font-size:11px; padding:4px 12px; border-radius:15px; text-decoration:none; border:1px solid var(--border); transition:0.3s; }
.tag-item:hover { background:var(--accent); color:#fff; }

.cta-box { background:linear-gradient(135deg,#0d1b2a,#1a3a5c); padding:35px 20px; border-radius:14px; text-align:center; margin-top:40px; border:1px solid rgba(0,180,216,0.2); }
.cta-box h3 { font-size:20px; font-weight:700; margin-bottom:10px; color:#fff; }
.cta-box p { font-size:13px; color:#90e0ef; margin-bottom:22px; }
.btn { padding:12px 28px; font-size:13px; font-weight:700; text-decoration:none; border-radius:25px; display:inline-block; background:var(--accent); color:#fff; transition:0.3s; font-family:"Tajawal",sans-serif; }
.btn:hover { background:#0096c7; transform:translateY(-2px); }

/* FOOTER */
footer { background:var(--bg2); padding:25px 20px 15px; border-top:1px solid var(--border); margin-top:40px; }
.footer-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; max-width:800px; margin:0 auto 15px; }
.footer-col h4 { font-size:13px; font-weight:700; color:var(--accent); margin-bottom:10px; }
.footer-col a { display:block; color:var(--text3); text-decoration:none; font-size:12px; margin-bottom:6px; transition:color 0.2s; }
.footer-col a:hover { color:var(--accent); }
.footer-bottom { text-align:center; padding-top:15px; border-top:1px solid var(--border); font-size:11px; color:var(--text3); }
.footer-bottom span { color:var(--accent); }

@media(max-width:600px) {
  .features { grid-template-columns:1fr; }
  .related-grid { grid-template-columns:1fr 1fr; }
  .footer-grid { grid-template-columns:1fr 1fr; }
}
